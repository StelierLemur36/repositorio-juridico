<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apuntes de Derecho — Workspace</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDfPfPCVIwOR0T-_2E_UUaPYyZEU3RB5-4",
            authDomain: "repositorio-juridico-88c93.firebaseapp.com",
            databaseURL: "https://repositorio-juridico-88c93-default-rtdb.firebaseio.com",
            projectId: "repositorio-juridico-88c93",
            storageBucket: "repositorio-juridico-88c93.firebasestorage.app",
            messagingSenderId: "648597577090",
            appId: "1:648597577090:web:77cf8def27804fdbaac39b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
    </script>
    <style>
        :root {
            --bg: #0a0a0c;
            --sidebar-bg: #101114;
            --surface: #1a1a1f;
            --surface-hover: #222228;
            --text: #e4e5e7;
            --text-secondary: #a0a3ab;
            --text-tertiary: #6b6f78;
            --border: #2a2a32;
            --accent: #3b82f6;
            --accent-light: rgba(59, 130, 246, 0.15);
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --danger-light: rgba(239, 68, 68, 0.12);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --radius-sm: 6px;
            --radius: 10px;
            --sidebar-width: 300px;
            --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
            --font-sans: 'Inter', 'Segoe UI', 'SF Pro Display', system-ui, sans-serif;
            --font-serif: 'Georgia', 'Times New Roman', 'Noto Serif', serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --reading-max: 780px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            display: flex;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: var(--shadow-sm);
            user-select: none;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 20px 20px 10px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }
        .sidebar-header .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 4px;
        }
        .sidebar-header .logo svg { width: 26px; height: 26px; color: var(--accent); }
        .sidebar-header .subtitle { font-size: 0.78rem; color: var(--text-tertiary); }
        .search-wrap { padding: 8px 16px 14px; flex-shrink: 0; }
        .search-input {
            width: 100%;
            padding: 9px 13px 9px 34px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: var(--transition);
            font-family: var(--font-sans);
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .search-input::placeholder { color: var(--text-tertiary); }
        .search-wrap { position: relative; }
        .search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 0 8px 12px; scroll-behavior: smooth; }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: #3a3a44; border-radius: 8px; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .btn-add-materia {
            width: 100%;
            padding: 10px 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.84rem;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-add-materia:hover { background: var(--accent-hover); }
        .btn-add-materia:active { transform: scale(0.97); }

        .materia-group { margin-bottom: 2px; }
        .materia-header {
            display: flex; align-items: center; padding: 9px 10px 9px 12px;
            border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
            gap: 7px; font-weight: 600; font-size: 0.875rem; color: var(--text);
        }
        .materia-header:hover { background: var(--surface-hover); }
        .materia-header .chevron { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--text-tertiary); transition: transform 0.2s; }
        .materia-header.expanded .chevron { transform: rotate(90deg); }
        .materia-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .materia-count { font-size: 0.7rem; background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 20px; color: var(--text-tertiary); }
        .materia-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
        .materia-header:hover .materia-actions { opacity: 1; }

        .btn-icon-sm {
            width: 26px; height: 26px; border: none; background: transparent;
            border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; color: var(--text-secondary); transition: var(--transition);
        }
        .btn-icon-sm:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .btn-icon-sm.danger:hover { background: var(--danger-light); color: var(--danger); }

        .topic-tree { margin-left: 16px; overflow: hidden; transition: max-height 0.3s, opacity 0.25s; opacity: 0; max-height: 0; }
        .topic-tree.open { opacity: 1; max-height: 6000px; }
        .topic-node {
            display: flex; align-items: center; padding: 6px 8px;
            border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
            font-size: 0.82rem; color: var(--text-secondary); gap: 5px;
        }
        .topic-node:hover { background: var(--surface-hover); color: var(--text); }
        .topic-node.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .node-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-tertiary); }
        .topic-node.active .node-dot { background: var(--accent); width: 6px; height: 6px; }
        .node-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .node-actions { display: flex; gap: 2px; opacity: 0; }
        .topic-node:hover .node-actions { opacity: 1; }

        .info-btn { opacity: 0; transition: opacity 0.15s; flex-shrink: 0; font-size: 0.7rem; }
        .materia-header:hover .info-btn,
        .topic-node:hover .info-btn,
        .topic-node.active .info-btn { opacity: 1; }

        .add-subtopic-btn {
            display: flex; align-items: center; gap: 5px; padding: 4px 8px 4px 20px;
            font-size: 0.72rem; color: var(--accent); cursor: pointer; border-radius: var(--radius-sm);
            transition: var(--transition); border: none; background: transparent; width: 100%;
            text-align: left; font-weight: 500; margin-top: 2px;
        }
        .add-subtopic-btn:hover { background: rgba(59,130,246,0.1); }

        /* MAIN PANEL */
        .main-panel { flex: 1; height: 100vh; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
        .main-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
            flex-shrink: 0; min-height: 56px; gap: 12px; box-shadow: var(--shadow-sm);
        }
        .breadcrumb { font-size: 0.8rem; color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .breadcrumb strong { color: var(--text); font-weight: 600; }
        .btn {
            padding: 8px 16px; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
            border: 1.5px solid transparent; transition: var(--transition); display: inline-flex;
            align-items: center; gap: 5px; white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
        .btn-outline:hover { background: var(--surface-hover); }
        .btn-danger-outline { background: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-danger-outline:hover { background: var(--danger-light); }

        .main-content { flex: 1; overflow-y: auto; padding: 28px 32px; scroll-behavior: smooth; }
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: #3a3a44; border-radius: 8px; }

        .welcome-state, .reading-container, .editor-container { max-width: var(--reading-max); margin: 0 auto; width: 100%; }
        .tema-title-display { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #f0f0f2; }
        .tema-meta { font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 24px; }
        .tema-body-rendered { font-family: var(--font-serif); font-size: 1rem; line-height: 1.8; color: #d1d4d8; }
        .tema-body-rendered h1 { font-size: 1.8rem; margin: 1.2em 0 0.5em; color: #f0f0f2; }
        .tema-body-rendered h2 { font-size: 1.45rem; margin: 1.2em 0 0.4em; color: #e2e4e9; }
        .tema-body-rendered h3 { font-size: 1.15rem; margin: 1.1em 0 0.3em; color: #d9dbe0; }
        .tema-body-rendered p { margin-bottom: 1.1em; }
        .tema-body-rendered strong { color: #ffffff; }
        .tema-body-rendered a { color: var(--accent); text-decoration: underline; }
        .tema-body-rendered ul, .tema-body-rendered ol { margin: 0.8em 0 1.1em 1.8em; }
        .tema-body-rendered table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.9em; }
        .tema-body-rendered th, .tema-body-rendered td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
        .tema-body-rendered th { background: rgba(255,255,255,0.04); font-weight: 600; }
        .aside-block { background: rgba(59,130,246,0.06); border-left: 4px solid var(--accent); padding: 12px 16px; margin: 1em 0; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; color: #cbd5e0; }
        .aside-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--accent); background: rgba(59,130,246,0.15); display: inline-block; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
        .editor-container label { display: block; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px; }
        .editor-container input[type="text"] { width: 100%; padding: 12px 16px; border: 1.8px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--surface); color: var(--text); outline: none; margin-bottom: 18px; }
        .editor-textarea { width: 100%; min-height: 380px; padding: 16px; border: 1.8px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-family: var(--font-mono); background: #0f0f14; color: #e4e4e8; outline: none; resize: vertical; line-height: 1.7; }
        .formatting-help { font-size: 0.72rem; color: var(--text-tertiary); margin-top: 8px; }
        .editor-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

        /* Toast */
        .toast {
            position: fixed; bottom: 28px; right: 28px; background: #2d2d36; color: #fff;
            padding: 10px 20px; border-radius: 8px; font-size: 0.82rem; font-weight: 500;
            z-index: 999; opacity: 0; transform: translateY(12px); transition: all 0.3s ease;
            pointer-events: none; box-shadow: var(--shadow-md);
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* Menú hamburguesa para móviles */
        .menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; padding: 4px; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 15; }
        .sidebar.open-mobile { transform: translateX(0); }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 20;
                width: 280px;
                min-width: 280px;
            }
            .sidebar.open-mobile {
                transform: translateX(0);
                box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            }
            .sidebar-overlay.active { display: block; }
            .main-toolbar { padding: 12px 16px; }
            .main-content { padding: 20px 16px; }
            .menu-toggle { display: block; }
            .tema-title-display { font-size: 1.4rem; }
            .breadcrumb { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Apuntes de Derecho
            </div>
            <div class="subtitle">Workspace jurídico</div>
        </div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar temas..." autocomplete="off">
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <button class="btn-add-materia" id="btnAddMateria">＋ Añadir Nueva Materia</button>
        </div>
    </aside>

    <main class="main-panel" id="mainPanel">
        <div class="main-toolbar" id="mainToolbar">
            <span class="breadcrumb" id="breadcrumb">Selecciona un tema para comenzar</span>
            <div class="toolbar-actions" id="toolbarActions"></div>
        </div>
        <div class="main-content" id="mainContent"></div>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        const db = getDatabase();

        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const menuToggle = document.getElementById('menuToggle');
        const sidebarNav = document.getElementById('sidebarNav');
        const mainContent = document.getElementById('mainContent');
        const breadcrumb = document.getElementById('breadcrumb');
        const toolbarActions = document.getElementById('toolbarActions');
        const searchInput = document.getElementById('searchInput');
        const btnAddMateria = document.getElementById('btnAddMateria');
        const toast = document.getElementById('toast');

        const MAX_DEPTH = 4;
        let data = { materias: [] };
        let selectedTopicId = null;
        let editingContext = null;
        let expandedMaterias = new Set();
        let expandedTopics = new Set();
        let searchQuery = '';
        let toastTimer = null;

        const dataRef = ref(db, '/');

        // Firebase listener
        function initFirebaseListener() {
            onValue(dataRef, (snapshot) => {
                const val = snapshot.val();
                if (val && val.materias) data = val;
                else data = { materias: [] };

                if (!selectedTopicId && data.materias.length > 0) {
                    const first = data.materias[0];
                    if (first.temas && first.temas.length > 0) selectedTopicId = first.temas[0].id;
                }
                const validIds = new Set(data.materias.map(m => m.id));
                expandedMaterias = new Set([...expandedMaterias].filter(id => validIds.has(id)));
                if (selectedTopicId && !findTopicById(selectedTopicId)) selectedTopicId = null;
                renderAll();
            });
        }

        function saveToFirebase() { set(dataRef, data); }

        function showToast(msg) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateId() { return crypto.randomUUID ? crypto.randomUUID() : 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

        function findTopicById(id) {
            for (let m of data.materias) {
                const res = findInTopics(m.temas, id);
                if (res) return { materia: m, topic: res.topic, parentChain: res.parentChain };
            }
            return null;
        }
        function findInTopics(topics, id, parentChain = []) {
            if (!topics) return null;
            for (let t of topics) {
                if (t.id === id) return { topic: t, parentChain };
                if (t.children) {
                    const found = findInTopics(t.children, id, [...parentChain, t]);
                    if (found) return found;
                }
            }
            return null;
        }

        function countAllTopics(topics) { return topics ? topics.reduce((acc, t) => acc + 1 + countAllTopics(t.children || []), 0) : 0; }

        // Markdown parser (tablas corregidas)
        function parseMarkdown(text) {
            if (!text) return '<p style="color:#9ca3af;font-style:italic;">Sin contenido.</p>';
            const lines = text.split('\n');
            let i = 0, out = [];
            while (i < lines.length) {
                const t = lines[i].trim();
                if (t === '<aside>') {
                    let aside = ''; i++;
                    while (i < lines.length && lines[i].trim() !== '</aside>') aside += lines[i++] + '\n';
                    i++;
                    out.push(`<div class="aside-block"><div class="aside-badge">📖 NOTA</div>${parseInline(escapeHTML(aside))}</div>`);
                } else if (t.startsWith('#')) {
                    const lvl = t.match(/^#+/)[0].length;
                    const tag = lvl === 1 ? 'h1' : lvl === 2 ? 'h2' : 'h3';
                    out.push(`<${tag}>${parseInline(escapeHTML(t.replace(/^#+\s*/, '')))}</${tag}>`);
                    i++;
                } else if (t === '---' || t === '***') { out.push('<hr>'); i++; }
                else if (t.startsWith('|') && t.endsWith('|')) {
                    const rows = [];
                    while (i < lines.length && lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|')) {
                        rows.push(lines[i].trim()); i++;
                    }
                    out.push(parseTable(rows));
                } else if (/^[\-\*]\s/.test(t)) {
                    const items = [];
                    while (i < lines.length && /^[\-\*]\s/.test(lines[i].trim())) {
                        items.push(`<li>${parseInline(escapeHTML(lines[i].trim().replace(/^[\-\*]\s/, '')))}</li>`);
                        i++;
                    }
                    out.push(`<ul>${items.join('')}</ul>`);
                } else if (/^\d+\.\s/.test(t)) {
                    const items = [];
                    while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) {
                        items.push(`<li>${parseInline(escapeHTML(lines[i].trim().replace(/^\d+\.\s/, '')))}</li>`);
                        i++;
                    }
                    out.push(`<ol>${items.join('')}</ol>`);
                } else if (t === '') { i++; }
                else {
                    const para = [];
                    while (i < lines.length && lines[i].trim() !== '' && !lines[i].trim().startsWith('#') && lines[i].trim() !== '---' && !lines[i].trim().startsWith('|')) {
                        para.push(lines[i].trim()); i++;
                    }
                    if (para.length) out.push(`<p>${parseInline(escapeHTML(para.join('<br>')))}</p>`);
                }
            }
            return out.join('') || '<p style="color:#9ca3af;">Sin contenido.</p>';
        }

        function parseTable(rows) {
            const clean = rows.filter(r => !/^[\|\s\-:]+$/.test(r));
            if (clean.length < 2) return '';
            const split = r => r.split('|').filter(c => c.trim() !== '').map(c => c.trim());
            const header = split(clean[0]);
            let html = '<table><thead><tr>' + header.map(h => `<th>${parseInline(escapeHTML(h))}</th>`).join('') + '</tr></thead><tbody>';
            for (let i = 1; i < clean.length; i++) {
                const cells = split(clean[i]);
                html += '<tr>' + cells.map(c => `<td>${parseInline(escapeHTML(c))}</td>`).join('') + '</tr>';
            }
            html += '</tbody></table>';
            return html;
        }

        function parseInline(text) {
            return text
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>');
        }

        function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Render
        function renderAll() { renderSidebar(); renderMainPanel(); }

        function renderSidebar() {
            sidebarNav.innerHTML = '';
            if (searchQuery.trim()) { renderSearchResults(); return; }
            if (!data.materias.length) {
                sidebarNav.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);">📭 Sin materias</div>';
                return;
            }
            data.materias.forEach(m => {
                const g = document.createElement('div'); g.className = 'materia-group';
                const exp = expandedMaterias.has(m.id);
                const h = document.createElement('div');
                h.className = 'materia-header' + (exp ? ' expanded' : '');
                h.innerHTML = `<span class="chevron">▶</span>
                    <span class="materia-name" title="${escapeHTML(m.nombre)}">${escapeHTML(m.nombre)}</span>
                    <button class="btn-icon-sm info-btn" data-action="show-fullname" data-fullname="${escapeHTML(m.nombre)}">ℹ️</button>
                    <span class="materia-count">${countAllTopics(m.temas)}</span>
                    <span class="materia-actions">
                        <button class="btn-icon-sm" data-action="add-root-topic" data-materia-id="${m.id}">＋</button>
                        <button class="btn-icon-sm" data-action="rename-materia" data-materia-id="${m.id}">✎</button>
                        <button class="btn-icon-sm danger" data-action="delete-materia" data-materia-id="${m.id}">✕</button>
                    </span>`;
                h.addEventListener('click', e => { if (!e.target.closest('[data-action]')) toggleMateriaExpand(m.id); });
                g.appendChild(h);
                const tree = document.createElement('div'); tree.className = 'topic-tree' + (exp ? ' open' : '');
                renderTopicTree(tree, m.temas, m.id, 0);
                g.appendChild(tree);
                sidebarNav.appendChild(g);
            });
            attachActions();
        }

        function renderTopicTree(container, topics, materiaId, depth) {
            if (!topics) return;
            topics.forEach(t => {
                const exp = expandedTopics.has(t.id);
                const node = document.createElement('div');
                node.className = 'topic-node' + (selectedTopicId === t.id ? ' active' : '');
                node.style.paddingLeft = (depth * 16 + 8) + 'px';
                const hasKids = t.children && t.children.length;
                let inner = `<span class="node-dot"></span>`;
                if (hasKids) inner += `<span class="chevron" style="font-size:0.55rem;cursor:pointer;">${exp ? '▼' : '▶'}</span>`;
                inner += `<span class="node-title" title="${escapeHTML(t.titulo || 'Sin título')}">${escapeHTML(t.titulo || 'Sin título')}</span>
                    <button class="btn-icon-sm info-btn" data-action="show-fullname" data-fullname="${escapeHTML(t.titulo || 'Sin título')}">ℹ️</button>
                    <span class="node-actions">
                        ${depth < MAX_DEPTH-1 ? `<button class="btn-icon-sm" data-action="add-subtopic" data-materia-id="${materiaId}" data-parent-id="${t.id}">＋</button>` : ''}
                        <button class="btn-icon-sm" data-action="delete-topic" data-topic-id="${t.id}">✕</button>
                    </span>`;
                node.innerHTML = inner;
                node.querySelector('.chevron')?.addEventListener('click', e => { e.stopPropagation(); toggleTopicExpand(t.id); });
                node.addEventListener('click', e => { if (!e.target.closest('[data-action]')) openTopicForReading(t.id); });
                container.appendChild(node);
                if (hasKids) {
                    const child = document.createElement('div'); child.className = 'topic-tree' + (exp ? ' open' : '');
                    renderTopicTree(child, t.children, materiaId, depth + 1);
                    container.appendChild(child);
                }
            });
        }

        function attachActions() {
            sidebarNav.querySelectorAll('[data-action]').forEach(b => {
                b.addEventListener('click', e => {
                    e.stopPropagation();
                    const act = b.dataset.action;
                    if (act === 'show-fullname') showToast(b.dataset.fullname);
                    else if (act === 'add-root-topic') startCreateTopic(b.dataset.materiaId, null);
                    else if (act === 'rename-materia') renameMateria(b.dataset.materiaId);
                    else if (act === 'delete-materia') deleteMateria(b.dataset.materiaId);
                    else if (act === 'add-subtopic') startCreateTopic(b.dataset.materiaId, b.dataset.parentId);
                    else if (act === 'delete-topic') deleteTopic(b.dataset.topicId);
                });
            });
        }

        function renderSearchResults() {
            const q = searchQuery.trim().toLowerCase();
            const results = [];
            data.materias.forEach(m => {
                searchInTopics(m.temas, m, q, results);
                if (m.nombre.toLowerCase().includes(q)) m.temas.forEach(t => addUnique(results, { materia: m, topic: t }));
            });
            if (!results.length) {
                sidebarNav.innerHTML = `<div style="padding:16px;color:var(--text-tertiary);">🔍 Sin resultados</div>`;
                return;
            }
            sidebarNav.innerHTML = `<div style="padding:8px 12px;font-size:0.7rem;color:var(--text-tertiary);">Resultados (${results.length})</div>`;
            results.forEach(r => {
                const item = document.createElement('div');
                item.className = 'topic-node';
                item.style.paddingLeft = '20px';
                const full = `${r.materia.nombre} › ${r.topic.titulo || 'Sin título'}`;
                item.innerHTML = `<span class="node-dot"></span><span class="node-title" title="${escapeHTML(full)}">📁 ${escapeHTML(full)}</span>
                    <button class="btn-icon-sm info-btn" data-action="show-fullname" data-fullname="${escapeHTML(full)}">ℹ️</button>`;
                item.addEventListener('click', () => openTopicForReading(r.topic.id));
                sidebarNav.appendChild(item);
            });
            attachActions();
        }

        function searchInTopics(topics, m, q, arr) {
            if (!topics) return;
            topics.forEach(t => {
                if (t.titulo.toLowerCase().includes(q) || (t.contenido||'').toLowerCase().includes(q)) addUnique(arr, { materia: m, topic: t });
                if (t.children) searchInTopics(t.children, m, q, arr);
            });
        }
        function addUnique(arr, item) { if (!arr.some(r => r.topic.id === item.topic.id)) arr.push(item); }

        function toggleMateriaExpand(id) { expandedMaterias.has(id) ? expandedMaterias.delete(id) : expandedMaterias.add(id); renderSidebar(); }
        function toggleTopicExpand(id) { expandedTopics.has(id) ? expandedTopics.delete(id) : expandedTopics.add(id); renderSidebar(); }

        function renderMainPanel() {
            if (editingContext) { renderEditor(); return; }
            if (selectedTopicId) {
                const info = findTopicById(selectedTopicId);
                if (info) { renderReadingView(info.materia, info.topic, info.parentChain); return; }
                selectedTopicId = null;
            }
            mainContent.innerHTML = `<div class="welcome-state"><div class="welcome-icon">📚</div><h3>Workspace Jurídico</h3><p>Selecciona un tema o crea una materia.</p></div>`;
            breadcrumb.textContent = 'Selecciona un tema';
            toolbarActions.innerHTML = '';
        }

        function renderReadingView(materia, topic, parentChain) {
            mainContent.innerHTML = `
                <div class="reading-container">
                    <h1 class="tema-title-display">${escapeHTML(topic.titulo || 'Sin título')}</h1>
                    <div class="tema-meta">📅 ${formatDate(topic.fechaModificacion || topic.fechaCreacion)} · ${buildBreadcrumbText(materia, parentChain)}</div>
                    <div class="tema-body-rendered">${parseMarkdown(topic.contenido || '')}</div>
                </div>`;
            breadcrumb.innerHTML = buildBreadcrumbHTML(materia, parentChain, topic);
            toolbarActions.innerHTML = `<button class="btn btn-outline" id="btnEdit">✎ Editar</button>
                <button class="btn btn-danger-outline" id="btnDelete">🗑 Eliminar</button>`;
            document.getElementById('btnEdit').onclick = () => startEditTopic(topic.id);
            document.getElementById('btnDelete').onclick = () => deleteTopic(topic.id);
        }

        function buildBreadcrumbText(m, chain) { return m.nombre + chain.map(t => ' › ' + (t.titulo||'Sin título')).join(''); }
        function buildBreadcrumbHTML(m, chain, cur) {
            let h = `📁 <strong>${escapeHTML(m.nombre)}</strong>`;
            chain.forEach(t => h += ` › ${escapeHTML(t.titulo||'Sin título')}`);
            if (cur) h += ` › <strong>${escapeHTML(cur.titulo||'Sin título')}</strong>`;
            return h;
        }
        function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : ''; }

        function renderEditor() {
            const ctx = editingContext;
            const m = data.materias.find(x => x.id === ctx.materiaId);
            if (!m) { editingContext = null; renderAll(); return; }
            let tit = '', cont = '', bread = '';
            if (ctx.topicId) {
                const info = findTopicById(ctx.topicId);
                if (info) { tit = info.topic.titulo || ''; cont = info.topic.contenido || ''; bread = buildBreadcrumbHTML(m, info.parentChain, info.topic); }
            } else {
                const chain = ctx.parentTopicId ? getTopicPath(ctx.materiaId, ctx.parentTopicId) : [];
                bread = `📁 <strong>${escapeHTML(m.nombre)}</strong>` + chain.map(t => ` › ${escapeHTML(t.titulo||'Sin título')}`).join('') + ` › <em>Nuevo tema</em>`;
            }
            mainContent.innerHTML = `
                <div class="editor-container">
                    <label for="editorTitulo">Título</label>
                    <input type="text" id="editorTitulo" value="${escapeHTML(tit)}" placeholder="Ej: Artículo 14...">
                    <label for="editorContenido">Contenido (Markdown)</label>
                    <textarea id="editorContenido" class="editor-textarea" placeholder="Escribe aquí...">${escapeHTML(cont)}</textarea>
                    <div class="formatting-help">💡 Negrita: **texto**, tablas: | celda |, aside: &lt;aside&gt;...&lt;/aside&gt;</div>
                    <div class="editor-actions">
                        <button class="btn btn-outline" id="btnCancel">Cancelar</button>
                        <button class="btn btn-primary" id="btnSave">💾 Guardar</button>
                    </div>
                </div>`;
            breadcrumb.innerHTML = bread;
            toolbarActions.innerHTML = '';
            document.getElementById('btnCancel').onclick = cancelEdit;
            document.getElementById('btnSave').onclick = saveEdit;
            document.getElementById('editorTitulo').focus();
            document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { cancelEdit(); } }, { once: true });
        }

        function getTopicPath(materiaId, topicId) {
            const path = [];
            const m = data.materias.find(x => x.id === materiaId);
            if (!m) return [];
            (function search(topics, anc) {
                for (let t of topics) {
                    if (t.id === topicId) { path.push(...anc, t); return true; }
                    if (t.children && search(t.children, [...anc, t])) return true;
                }
            })(m.temas, []);
            return path;
        }

        function startCreateTopic(materiaId, parentId) {
            const depth = parentId ? getTopicPath(materiaId, parentId).length : 0;
            if (depth >= MAX_DEPTH) { showToast('Máximo 4 niveles'); return; }
            expandedMaterias.add(materiaId);
            editingContext = { materiaId, parentTopicId: parentId || null, topicId: null };
            selectedTopicId = null;
            searchQuery = ''; searchInput.value = '';
            renderAll();
        }
        function startEditTopic(id) {
            const info = findTopicById(id);
            if (!info) return;
            editingContext = { materiaId: info.materia.id, parentTopicId: info.parentChain.length ? info.parentChain[info.parentChain.length-1].id : null, topicId: id };
            selectedTopicId = null;
            renderAll();
        }
        function cancelEdit() { const prev = editingContext?.topicId; editingContext = null; selectedTopicId = prev; renderAll(); }
        function saveEdit() {
            const tit = document.getElementById('editorTitulo')?.value.trim();
            const cont = document.getElementById('editorContenido')?.value || '';
            if (!tit) { showToast('Título requerido'); return; }
            const ctx = editingContext;
            const m = data.materias.find(x => x.id === ctx.materiaId);
            if (!m) return;
            const now = new Date().toISOString();
            if (ctx.topicId) {
                const info = findTopicById(ctx.topicId);
                if (info) { info.topic.titulo = tit; info.topic.contenido = cont; info.topic.fechaModificacion = now; }
            } else {
                const nuevo = { id: generateId(), titulo: tit, contenido: cont, children: [], fechaCreacion: now, fechaModificacion: now };
                if (ctx.parentTopicId) {
                    const parent = findTopicById(ctx.parentTopicId);
                    if (parent) { parent.topic.children = parent.topic.children || []; parent.topic.children.push(nuevo); ctx.topicId = nuevo.id; }
                } else { m.temas.push(nuevo); ctx.topicId = nuevo.id; }
            }
            saveToFirebase();
            const saved = ctx.topicId;
            editingContext = null; selectedTopicId = saved;
            renderAll();
            showToast('✅ Guardado');
        }

        function deleteTopic(id) {
            const info = findTopicById(id);
            if (!info || !confirm(`¿Eliminar "${info.topic.titulo}" y subtemas?`)) return;
            if (info.parentChain.length === 0) info.materia.temas = info.materia.temas.filter(t => t.id !== id);
            else { const p = info.parentChain[info.parentChain.length-1]; p.children = p.children.filter(t => t.id !== id); }
            if (selectedTopicId === id) selectedTopicId = null;
            if (editingContext?.topicId === id) editingContext = null;
            saveToFirebase();
            renderAll();
            showToast('🗑 Eliminado');
        }
        function deleteMateria(id) {
            const m = data.materias.find(x => x.id === id);
            if (!m || !confirm(`¿Eliminar materia "${m.nombre}"?`)) return;
            data.materias = data.materias.filter(x => x.id !== id);
            expandedMaterias.delete(id);
            if (selectedTopicId && findTopicById(selectedTopicId)?.materia.id === id) selectedTopicId = null;
            saveToFirebase();
            renderAll();
            showToast('🗑 Materia eliminada');
        }
        function renameMateria(id) {
            const m = data.materias.find(x => x.id === id);
            if (!m) return;
            const name = prompt('Nuevo nombre:', m.nombre);
            if (name && name.trim()) { m.nombre = name.trim(); saveToFirebase(); renderAll(); showToast('✏️ Renombrado'); }
        }

        function openTopicForReading(id) { selectedTopicId = id; editingContext = null; searchQuery = ''; searchInput.value = ''; closeMobileSidebar(); renderAll(); }

        // Menú móvil
        function openMobileSidebar() { sidebar.classList.add('open-mobile'); sidebarOverlay.classList.add('active'); }
        function closeMobileSidebar() { sidebar.classList.remove('open-mobile'); sidebarOverlay.classList.remove('active'); }
        menuToggle.addEventListener('click', openMobileSidebar);
        sidebarOverlay.addEventListener('click', closeMobileSidebar);

        btnAddMateria.addEventListener('click', () => {
            const name = prompt('Nombre de la materia:');
            if (name && name.trim()) {
                const newM = { id: generateId(), nombre: name.trim(), temas: [] };
                data.materias.push(newM);
                expandedMaterias.add(newM.id);
                saveToFirebase();
                renderAll();
                closeMobileSidebar();
            }
        });

        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value;
            renderSidebar();
            if (!searchQuery.trim() && selectedTopicId) renderMainPanel();
        });

        initFirebaseListener();
    </script>
</body>
</html>
