    <div class="toast" id="toast"></div>

    <script type="module">
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        // La app ya fue inicializada en el script inline anterior
        const db = getDatabase();

        const sidebarNav = document.getElementById('sidebarNav');
        const mainContent = document.getElementById('mainContent');
        const breadcrumb = document.getElementById('breadcrumb');
        const toolbarActions = document.getElementById('toolbarActions');
        const searchInput = document.getElementById('searchInput');
        const btnAddMateria = document.getElementById('btnAddMateria');
        const toast = document.getElementById('toast');

        const MAX_DEPTH = 4;
        let data = { materias: [] };
        let selectedTopicId = null;
        let editingContext = null;
        let expandedMaterias = new Set();
        let expandedTopics = new Set();
        let searchQuery = '';
        let toastTimer = null;
        let firebaseLoaded = false;

        // Referencia a la base de datos
        const dataRef = ref(db, '/');

        // ============ Firebase: cargar y sincronizar ============
        function initFirebaseListener() {
            onValue(dataRef, (snapshot) => {
                const val = snapshot.val();
                if (val && val.materias) {
                    data = val;
                } else {
                    // Si no hay datos, inicializamos vacío
                    data = { materias: [] };
                }
                if (!firebaseLoaded) {
                    firebaseLoaded = true;
                    // Primera carga: expandir materias si son pocas, seleccionar primer tema
                    if (data.materias.length <= 5) {
                        data.materias.forEach(m => expandedMaterias.add(m.id));
                    }
                    if (!selectedTopicId && data.materias.length > 0) {
                        const first = data.materias[0];
                        if (first.temas && first.temas.length > 0) {
                            selectedTopicId = first.temas[0].id;
                        }
                    }
                }
                // Reexpander materias que estaban expandidas (por id)
                // Mantener expandedMaterias y expandedTopics que aún existan
                const validMaterias = new Set(data.materias.map(m => m.id));
                expandedMaterias = new Set([...expandedMaterias].filter(id => validMaterias.has(id)));
                // Validar selectedTopicId
                if (selectedTopicId && !findTopicById(selectedTopicId)) {
                    selectedTopicId = null;
                }
                renderAll();
            }, (error) => {
                console.error('Error al leer datos:', error);
                showToast('⚠️ Error de conexión. Reintentando...');
            });
        }

        function saveToFirebase() {
            set(dataRef, data).catch(err => {
                console.error('Error al guardar:', err);
                showToast('⚠️ No se pudo guardar en la nube.');
            });
        }

        // ============ Helpers ============
        function showToast(msg) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function generateId() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function findTopicById(topicId) {
            for (let materia of data.materias) {
                const result = findInTopics(materia.temas, topicId);
                if (result) return { materia, topic: result.topic, parentChain: result.parentChain };
            }
            return null;
        }

        function findInTopics(topics, id, parentChain = []) {
            if (!topics) return null;
            for (let t of topics) {
                if (t.id === id) return { topic: t, parentChain };
                if (t.children && t.children.length) {
                    const found = findInTopics(t.children, id, [...parentChain, t]);
                    if (found) return found;
                }
            }
            return null;
        }

        function getDepthInMateria(materiaId, topicId) {
            const path = getTopicPath(materiaId, topicId);
            return path.length;
        }

        function getTopicPath(materiaId, topicId) {
            const path = [];
            const materia = data.materias.find(m => m.id === materiaId);
            if (!materia) return [];
            function search(topics, ancestors) {
                for (let t of topics) {
                    const newAncestors = [...ancestors, t];
                    if (t.id === topicId) { path.push(...newAncestors); return true; }
                    if (t.children && t.children.length && search(t.children, newAncestors)) return true;
                }
                return false;
            }
            search(materia.temas, []);
            return path;
        }

        function countAllTopics(topics) {
            if (!topics) return 0;
            let c = 0;
            for (let t of topics) {
                c++;
                if (t.children) c += countAllTopics(t.children);
            }
            return c;
        }

        // ============ Markdown Parser (corregido para tablas con celdas vacías) ============
        function parseMarkdown(text) {
            if (!text) return '<p style="color:#9ca3af;font-style:italic;">Sin contenido.</p>';
            const lines = text.split('\n');
            const output = [];
            let i = 0;
            while (i < lines.length) {
                const raw = lines[i];
                const trimmed = raw.trim();
                if (trimmed === '<aside>' || trimmed.startsWith('<aside>')) {
                    const asideLines = [];
                    i++;
                    while (i < lines.length && lines[i].trim() !== '</aside>') {
                        asideLines.push(lines[i]);
                        i++;
                    }
                    i++; // saltar </aside>
                    const inner = asideLines.join('\n');
                    output.push('<div class="aside-block"><div class="aside-badge">📖 NOTA</div>' + parseInlineMarkdown(escapeHTML(inner)) + '</div>');
                    continue;
                }
                if (trimmed.startsWith('#')) {
                    const level = trimmed.match(/^#+/)[0].length;
                    const content = trimmed.replace(/^#+\s*/, '');
                    if (level === 1) output.push('<h1>' + parseInlineMarkdown(escapeHTML(content)) + '</h1>');
                    else if (level === 2) output.push('<h2>' + parseInlineMarkdown(escapeHTML(content)) + '</h2>');
                    else output.push('<h3>' + parseInlineMarkdown(escapeHTML(content)) + '</h3>');
                    i++;
                    continue;
                }
                if (trimmed.startsWith('---') || trimmed.startsWith('***') || trimmed.startsWith('___')) {
                    output.push('<hr>');
                    i++;
                    continue;
                }
                // Tabla: detectar filas que empiezan y terminan con |
                if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
                    const tableRows = [];
                    while (i < lines.length && lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|')) {
                        tableRows.push(lines[i].trim());
                        i++;
                    }
                    output.push(parseTable(tableRows));
                    continue;
                }
                if (/^[\-\*]\s/.test(trimmed)) {
                    const listItems = [];
                    while (i < lines.length && /^[\-\*]\s/.test(lines[i].trim())) {
                        listItems.push('<li>' + parseInlineMarkdown(escapeHTML(lines[i].trim().replace(/^[\-\*]\s/, ''))) + '</li>');
                        i++;
                    }
                    output.push('<ul>' + listItems.join('') + '</ul>');
                    continue;
                }
                if (/^\d+\.\s/.test(trimmed)) {
                    const listItems = [];
                    while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) {
                        listItems.push('<li>' + parseInlineMarkdown(escapeHTML(lines[i].trim().replace(/^\d+\.\s/, ''))) + '</li>');
                        i++;
                    }
                    output.push('<ol>' + listItems.join('') + '</ol>');
                    continue;
                }
                if (trimmed === '') { i++; continue; }
                // Párrafo
                const paraLines = [];
                while (i < lines.length && lines[i].trim() !== '' && !lines[i].trim().startsWith('#') && !lines[i].trim().startsWith('---') && !lines[i].trim().startsWith('|') && !/^[\-\*]\s/.test(lines[i].trim()) && !/^\d+\.\s/.test(lines[i].trim()) && lines[i].trim() !== '<aside>' && !lines[i].trim().startsWith('<aside>')) {
                    paraLines.push(lines[i].trim());
                    i++;
                }
                if (paraLines.length > 0) {
                    output.push('<p>' + parseInlineMarkdown(escapeHTML(paraLines.join('<br>'))) + '</p>');
                }
            }
            return output.join('\n') || '<p style="color:#9ca3af;font-style:italic;">Sin contenido.</p>';
        }

        function parseTable(rows) {
            if (rows.length < 2) return '';
            // Filtrar filas que son separadores (solo contienen |, -, :, espacios)
            const isSeparator = (row) => /^[\|\s\-:]+$/.test(row);
            const dataRows = rows.filter(r => !isSeparator(r));
            if (dataRows.length === 0) return '';

            const headerRow = dataRows[0];
            const bodyRows = dataRows.slice(1);

            const splitCells = (row) => {
                // Dividir por |, quitando el primer y último elemento vacío si existe
                const parts = row.split('|');
                // El split de "| a | b |" da ["", " a ", " b ", ""]
                if (parts.length > 0 && parts[0].trim() === '') parts.shift();
                if (parts.length > 0 && parts[parts.length-1].trim() === '') parts.pop();
                return parts.map(c => c.trim());
            };

            const headerCells = splitCells(headerRow);
            let html = '<table><thead><tr>';
            headerCells.forEach(cell => {
                html += '<th>' + parseInlineMarkdown(escapeHTML(cell)) + '</th>';
            });
            html += '</tr></thead><tbody>';

            bodyRows.forEach(row => {
                const cells = splitCells(row);
                html += '<tr>';
                cells.forEach(cell => {
                    html += '<td>' + parseInlineMarkdown(escapeHTML(cell)) + '</td>';
                });
                // Si hay menos celdas que encabezados, rellenamos con celdas vacías
                for (let j = cells.length; j < headerCells.length; j++) {
                    html += '<td></td>';
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        function parseInlineMarkdown(text) {
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            return text;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ============ Renderizado ============
        function renderAll() {
            renderSidebar();
            renderMainPanel();
        }

        function renderSidebar() {
            sidebarNav.innerHTML = '';
            if (searchQuery.trim()) { renderSearchResults(); return; }
            if (data.materias.length === 0) {
                sidebarNav.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:0.8rem;">📭 Sin materias aún</div>`;
                return;
            }
            data.materias.forEach(materia => {
                const group = document.createElement('div');
                group.className = 'materia-group';
                const isExpanded = expandedMaterias.has(materia.id);
                const header = document.createElement('div');
                header.className = 'materia-header' + (isExpanded ? ' expanded' : '');
                header.innerHTML = `
                    <span class="chevron">▶</span>
                    <span class="materia-name">${escapeHTML(materia.nombre)}</span>
                    <span class="materia-count">${countAllTopics(materia.temas)}</span>
                    <span class="materia-actions">
                        <button class="btn-icon-sm" data-action="add-root-topic" data-materia-id="${materia.id}" title="Añadir tema raíz">＋</button>
                        <button class="btn-icon-sm" data-action="rename-materia" data-materia-id="${materia.id}" title="Renombrar">✎</button>
                        <button class="btn-icon-sm danger" data-action="delete-materia" data-materia-id="${materia.id}" title="Eliminar">✕</button>
                    </span>
                `;
                header.addEventListener('click', function(e) {
                    if (e.target.closest('[data-action]')) return;
                    toggleMateriaExpand(materia.id);
                });
                group.appendChild(header);

                const treeContainer = document.createElement('div');
                treeContainer.className = 'topic-tree' + (isExpanded ? ' open' : '');
                renderTopicTree(treeContainer, materia.temas, materia.id, 0);
                group.appendChild(treeContainer);
                sidebarNav.appendChild(group);
            });
            attachSidebarActions();
        }

        function renderTopicTree(container, topics, materiaId, depth) {
            if (!topics) return;
            topics.forEach(topic => {
                const isExpanded = expandedTopics.has(topic.id);
                const node = document.createElement('div');
                node.className = 'topic-node' + (selectedTopicId === topic.id ? ' active' : '');
                node.style.paddingLeft = (depth * 16 + 8) + 'px';
                const hasChildren = topic.children && topic.children.length > 0;
                node.innerHTML = `
                    <span class="node-dot"></span>
                    <span class="node-title">${escapeHTML(topic.titulo || 'Sin título')}</span>
                    <span class="node-actions">
                        ${depth < MAX_DEPTH-1 ? `<button class="btn-icon-sm" data-action="add-subtopic" data-materia-id="${materiaId}" data-parent-id="${topic.id}" title="Añadir subtema">＋</button>` : ''}
                        <button class="btn-icon-sm" data-action="delete-topic" data-topic-id="${topic.id}" title="Eliminar">✕</button>
                    </span>
                `;
                if (hasChildren) {
                    const expandArrow = document.createElement('span');
                    expandArrow.className = 'chevron';
                    expandArrow.style.fontSize = '0.55rem';
                    expandArrow.style.marginRight = '4px';
                    expandArrow.textContent = isExpanded ? '▼' : '▶';
                    expandArrow.style.cursor = 'pointer';
                    expandArrow.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleTopicExpand(topic.id);
                    });
                    node.prepend(expandArrow);
                }
                node.addEventListener('click', function(e) {
                    if (e.target.closest('[data-action]')) return;
                    openTopicForReading(topic.id);
                });
                container.appendChild(node);

                if (hasChildren) {
                    const childContainer = document.createElement('div');
                    childContainer.className = 'topic-tree' + (isExpanded ? ' open' : '');
                    renderTopicTree(childContainer, topic.children, materiaId, depth + 1);
                    container.appendChild(childContainer);
                }
            });
        }

        function attachSidebarActions() {
            sidebarNav.querySelectorAll('[data-action]').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const action = this.dataset.action;
                    if (action === 'add-root-topic') startCreateTopic(this.dataset.materiaId, null);
                    else if (action === 'rename-materia') renameMateria(this.dataset.materiaId);
                    else if (action === 'delete-materia') deleteMateria(this.dataset.materiaId);
                    else if (action === 'add-subtopic') startCreateTopic(this.dataset.materiaId, this.dataset.parentId);
                    else if (action === 'delete-topic') deleteTopic(this.dataset.topicId);
                });
            });
        }

        function renderSearchResults() {
            const q = searchQuery.trim().toLowerCase();
            const results = [];
            data.materias.forEach(materia => {
                searchInTopics(materia.temas, materia, q, results);
                if (materia.nombre.toLowerCase().includes(q)) {
                    materia.temas.forEach(t => addUniqueResult(results, { materia, topic: t }));
                }
            });
            if (results.length === 0) {
                sidebarNav.innerHTML = `<div style="padding:16px;color:var(--text-tertiary);">🔍 Sin resultados para "${escapeHTML(q)}"</div>`;
                return;
            }
            const header = document.createElement('div');
            header.className = 'search-results-header';
            header.textContent = `Resultados (${results.length})`;
            sidebarNav.appendChild(header);
            results.forEach(r => {
                const item = document.createElement('div');
                item.className = 'topic-node';
                item.style.paddingLeft = '20px';
                item.innerHTML = `<span class="node-dot"></span><span class="node-title">📁 ${escapeHTML(r.materia.nombre)} › ${escapeHTML(r.topic.titulo || 'Sin título')}</span>`;
                item.addEventListener('click', () => openTopicForReading(r.topic.id));
                sidebarNav.appendChild(item);
            });
        }

        function searchInTopics(topics, materia, q, results) {
            if (!topics) return;
            for (let t of topics) {
                if (t.titulo.toLowerCase().includes(q) || (t.contenido||'').toLowerCase().includes(q)) addUniqueResult(results, { materia, topic: t });
                if (t.children) searchInTopics(t.children, materia, q, results);
            }
        }
        function addUniqueResult(results, newItem) {
            if (!results.some(r => r.topic.id === newItem.topic.id)) results.push(newItem);
        }

        function toggleMateriaExpand(id) {
            if (expandedMaterias.has(id)) expandedMaterias.delete(id);
            else expandedMaterias.add(id);
            renderSidebar();
        }
        function toggleTopicExpand(topicId) {
            if (expandedTopics.has(topicId)) expandedTopics.delete(topicId);
            else expandedTopics.add(topicId);
            renderSidebar();
        }

        function renderMainPanel() {
            if (editingContext) { renderEditor(); return; }
            if (selectedTopicId) {
                const info = findTopicById(selectedTopicId);
                if (info) { renderReadingView(info.materia, info.topic, info.parentChain); return; }
                selectedTopicId = null;
            }
            renderWelcome();
        }

        function renderWelcome() {
            mainContent.innerHTML = `<div class="welcome-state"><div class="welcome-icon">📚</div><h3>Workspace Jurídico</h3><p>Selecciona un tema o crea una nueva materia.</p></div>`;
            breadcrumb.textContent = 'Selecciona un tema';
            toolbarActions.innerHTML = '';
        }

        function renderReadingView(materia, topic, parentChain) {
            const html = parseMarkdown(topic.contenido || '');
            mainContent.innerHTML = `
                <div class="reading-container">
                    <h1 class="tema-title-display">${escapeHTML(topic.titulo || 'Sin título')}</h1>
                    <div class="tema-meta">📅 ${formatDate(topic.fechaModificacion || topic.fechaCreacion)} · ${buildBreadcrumbText(materia, parentChain)}</div>
                    <div class="tema-body-rendered">${html}</div>
                </div>`;
            breadcrumb.innerHTML = buildBreadcrumbHTML(materia, parentChain, topic);
            toolbarActions.innerHTML = `
                <button class="btn btn-outline" id="btnEdit">✎ Editar</button>
                <button class="btn btn-danger-outline" id="btnDelete">🗑 Eliminar</button>`;
            document.getElementById('btnEdit').addEventListener('click', () => startEditTopic(topic.id));
            document.getElementById('btnDelete').addEventListener('click', () => deleteTopic(topic.id));
        }

        function buildBreadcrumbText(materia, parentChain) {
            let str = materia.nombre;
            parentChain.forEach(t => str += ' › ' + (t.titulo || 'Sin título'));
            return str;
        }

        function buildBreadcrumbHTML(materia, parentChain, currentTopic) {
            let html = `📁 <strong>${escapeHTML(materia.nombre)}</strong>`;
            parentChain.forEach(t => html += ` › ${escapeHTML(t.titulo || 'Sin título')}`);
            if (currentTopic) html += ` › <strong>${escapeHTML(currentTopic.titulo || 'Sin título')}</strong>`;
            return html;
        }

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        // ============ Editor ============
        function renderEditor() {
            const ctx = editingContext;
            const materia = data.materias.find(m => m.id === ctx.materiaId);
            if (!materia) { editingContext = null; renderAll(); return; }
            let titulo = '', contenido = '', breadPath = '';
            if (ctx.topicId) {
                const info = findTopicById(ctx.topicId);
                if (info) {
                    titulo = info.topic.titulo || '';
                    contenido = info.topic.contenido || '';
                    breadPath = buildBreadcrumbHTML(materia, info.parentChain, info.topic);
                }
            } else {
                const parentChain = ctx.parentTopicId ? getTopicPath(ctx.materiaId, ctx.parentTopicId) : [];
                breadPath = `📁 <strong>${escapeHTML(materia.nombre)}</strong>` + (parentChain.map(t => ` › ${escapeHTML(t.titulo||'Sin título')}`).join('')) + ` › <em>Nuevo tema</em>`;
            }
            mainContent.innerHTML = `
                <div class="editor-container">
                    <label for="editorTitulo">Título del tema</label>
                    <input type="text" id="editorTitulo" value="${escapeHTML(titulo)}" placeholder="Ej: Artículo 14...">
                    <label for="editorContenido">Contenido (Markdown)</label>
                    <textarea id="editorContenido" class="editor-textarea" placeholder="Escribe aquí usando formato Markdown...">${escapeHTML(contenido)}</textarea>
                    <div class="formatting-help">
                        💡 <strong>Formato:</strong> Usa <span>**negrita**</span>, <span>*itálica*</span>, <span>[enlace](url)</span>, <span># Encabezados</span>, <span>&lt;aside&gt;...&lt;/aside&gt;</span> para bloques, <span>| Tablas |</span>, <span>- listas</span>. Ctrl+S para guardar.
                    </div>
                    <div class="editor-actions">
                        <button class="btn btn-outline" id="btnCancel">Cancelar</button>
                        <button class="btn btn-primary" id="btnSave">💾 Guardar</button>
                    </div>
                </div>`;
            breadcrumb.innerHTML = breadPath;
            toolbarActions.innerHTML = '';
            document.getElementById('btnCancel').addEventListener('click', cancelEdit);
            document.getElementById('btnSave').addEventListener('click', saveEdit);
            document.getElementById('editorTitulo').focus();
            document.addEventListener('keydown', function escapeHandler(e) {
                if (e.key === 'Escape') { cancelEdit(); document.removeEventListener('keydown', escapeHandler); }
            });
        }

        function startCreateTopic(materiaId, parentTopicId) {
            const depth = parentTopicId ? getDepthInMateria(materiaId, parentTopicId) + 1 : 1;
            if (depth > MAX_DEPTH) { showToast('⚠️ Máximo 4 niveles de subtemas.'); return; }
            if (!expandedMaterias.has(materiaId)) expandedMaterias.add(materiaId);
            editingContext = { materiaId, parentTopicId: parentTopicId || null, topicId: null };
            selectedTopicId = null;
            searchQuery = ''; searchInput.value = '';
            renderAll();
        }

        function startEditTopic(topicId) {
            const info = findTopicById(topicId);
            if (!info) return;
            editingContext = { materiaId: info.materia.id, parentTopicId: info.parentChain.length ? info.parentChain[info.parentChain.length-1].id : null, topicId };
            selectedTopicId = null;
            renderAll();
        }

        function cancelEdit() {
            const prevTopic = editingContext?.topicId || null;
            editingContext = null;
            selectedTopicId = prevTopic;
            renderAll();
        }

        function saveEdit() {
            const titulo = document.getElementById('editorTitulo')?.value.trim();
            const contenido = document.getElementById('editorContenido')?.value || '';
            if (!titulo) { showToast('⚠️ Ingresa un título.'); return; }
            const ctx = editingContext;
            if (!ctx) return;
            const materia = data.materias.find(m => m.id === ctx.materiaId);
            if (!materia) return;
            const now = new Date().toISOString();
            if (ctx.topicId) {
                const info = findTopicById(ctx.topicId);
                if (info) {
                    info.topic.titulo = titulo;
                    info.topic.contenido = contenido;
                    info.topic.fechaModificacion = now;
                }
            } else {
                const newTopic = { id: generateId(), titulo, contenido, children: [], fechaCreacion: now, fechaModificacion: now };
                if (ctx.parentTopicId) {
                    const parent = findTopicById(ctx.parentTopicId);
                    if (parent && parent.topic) {
                        parent.topic.children = parent.topic.children || [];
                        parent.topic.children.push(newTopic);
                        ctx.topicId = newTopic.id;
                    }
                } else {
                    materia.temas = materia.temas || [];
                    materia.temas.push(newTopic);
                    ctx.topicId = newTopic.id;
                }
            }
            saveToFirebase();
            const savedId = ctx.topicId;
            editingContext = null;
            selectedTopicId = savedId;
            renderAll();
            showToast('✅ Tema guardado.');
        }

        function deleteTopic(topicId) {
            const info = findTopicById(topicId);
            if (!info) return;
            if (!confirm(`¿Eliminar "${info.topic.titulo}" y todos sus subtemas?`)) return;
            const materia = info.materia;
            if (info.parentChain.length === 0) {
                materia.temas = materia.temas.filter(t => t.id !== topicId);
            } else {
                const parent = info.parentChain[info.parentChain.length-1];
                parent.children = parent.children.filter(t => t.id !== topicId);
            }
            if (selectedTopicId === topicId) selectedTopicId = null;
            if (editingContext?.topicId === topicId) editingContext = null;
            saveToFirebase();
            renderAll();
            showToast('🗑 Tema eliminado.');
        }

        function deleteMateria(materiaId) {
            const materia = data.materias.find(m => m.id === materiaId);
            if (!materia) return;
            if (!confirm(`¿Eliminar materia "${materia.nombre}" y todos sus temas?`)) return;
            data.materias = data.materias.filter(m => m.id !== materiaId);
            expandedMaterias.delete(materiaId);
            if (selectedTopicId && findTopicById(selectedTopicId)?.materia.id === materiaId) selectedTopicId = null;
            if (editingContext?.materiaId === materiaId) editingContext = null;
            saveToFirebase();
            renderAll();
            showToast('🗑 Materia eliminada.');
        }

        function renameMateria(materiaId) {
            const materia = data.materias.find(m => m.id === materiaId);
            if (!materia) return;
            const newName = prompt('Nuevo nombre:', materia.nombre);
            if (newName && newName.trim()) {
                materia.nombre = newName.trim();
                saveToFirebase();
                renderAll();
                showToast('✏️ Materia renombrada.');
            }
        }

        function openTopicForReading(topicId) {
            selectedTopicId = topicId;
            editingContext = null;
            searchQuery = ''; searchInput.value = '';
            renderAll();
        }

        btnAddMateria.addEventListener('click', () => {
            const name = prompt('Nombre de la nueva materia:');
            if (name && name.trim()) {
                const newMateria = { id: generateId(), nombre: name.trim(), temas: [] };
                data.materias.push(newMateria);
                expandedMaterias.add(newMateria.id);
                saveToFirebase();
                renderAll();
            }
        });

        searchInput.addEventListener('input', function() {
            searchQuery = this.value;
            renderSidebar();
            if (!searchQuery.trim() && selectedTopicId) renderMainPanel();
            if (!searchQuery.trim() && !selectedTopicId && !editingContext) renderWelcome();
        });

        // Iniciar todo
        initFirebaseListener();
    </script>
</body>
</html>
